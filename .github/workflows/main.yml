name: Build LaTeX PDF

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      entry_point:
        description: "Main TeX file name (without .tex extension)"
        required: true
        default: "main"

env:
  # Значение по умолчанию для сборки по тегу (можно изменить при необходимости)
  MAIN_TEX: main

jobs:
  build:
    runs-on: ubuntu-latest
    # Используем официальный Docker-образ с полным TeX Live (включает все пакеты,
    # поддержку русского языка, XeLaTeX, LuaLaTeX, biber и т.д.)
    container: texlive/texlive:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine entry point
        id: entry
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.entry_point }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.MAIN_TEX }}" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX with latexmk
        run: |
          latexmk -pdf -lualatex \
            -interaction=nonstopmode \
            -halt-on-error \
            ${{ steps.entry.outputs.name }}
        # latexmk автоматически запустит bibtex/biber и сделает нужное число проходов

      - name: Generate output PDF name
        id: pdfname
        run: |
          ENTRY="${{ steps.entry.outputs.name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # ручной запуск: добавляем суффикс -manual-<дата-время> (UTC)
            DATETIME=$(date -u +%Y%m%d-%H%M)
            PDF_NAME="${ENTRY}-manual-${DATETIME}.pdf"
          else
            # сборка по тегу: используем имя тега (GITHUB_REF_NAME)
            TAG="${GITHUB_REF_NAME}"
            PDF_NAME="${ENTRY}-${TAG}.pdf"
          fi
          echo "pdf=$PDF_NAME" >> $GITHUB_OUTPUT

      - name: Rename PDF file
        run: mv "${ENTRY}.pdf" "${{ steps.pdfname.outputs.pdf }}"
        env:
          ENTRY: ${{ steps.entry.outputs.name }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: ${{ steps.pdfname.outputs.pdf }}
