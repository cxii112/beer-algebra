name: Build LaTeX PDF

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      entry_point:
        description: "Main TeX file name (without .tex extension)"
        required: true
        default: "main"

env:
  MAIN_TEX: main

# Разрешаем создавать релизы и загружать в них файлы
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Liberation fonts
        run: |
          apt-get update
          apt-get install -y fonts-liberation2

      - name: Determine entry point
        id: entry
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.entry_point }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.MAIN_TEX }}" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX with latexmk
        run: |
          latexmk -pdf -xelatex \
            -interaction=nonstopmode \
            -halt-on-error \
            ${{ steps.entry.outputs.name }}

      - name: Generate output PDF name
        id: pdfname
        run: |
          ENTRY="${{ steps.entry.outputs.name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATETIME=$(date -u +%Y%m%d-%H%M)
            PDF_NAME="${ENTRY}-manual-${DATETIME}.pdf"
          else
            TAG="${GITHUB_REF_NAME}"
            PDF_NAME="${ENTRY}-${TAG}.pdf"
          fi
          echo "pdf=$PDF_NAME" >> $GITHUB_OUTPUT

      - name: Rename PDF file
        run: mv "${ENTRY}.pdf" "${{ steps.pdfname.outputs.pdf }}"
        env:
          ENTRY: ${{ steps.entry.outputs.name }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: ${{ steps.pdfname.outputs.pdf }}

      # Загрузка в релиз (только при push тега)
      - name: Upload PDF to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pdfname.outputs.pdf }}
          generate_release_notes: true # автоматически создаёт описание релиза из коммитов
